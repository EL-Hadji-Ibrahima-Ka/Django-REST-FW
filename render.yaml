services:
  - type: web
    name: bibliotheque-project
    env: python
    buildCommand: bash build.sh
    startCommand: bash run.sh
    envVars:
      - key: DEBUG
        value: 'False'
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bibliotheque-db
          property: connectionString
databases:
  - name: bibliotheque-db
    databaseName: bibliotheque
    plan: free
